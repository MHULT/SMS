<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adminlogin — Security Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1A2456 0%, #1E3A8A 50%, #2D6ADF 100%);
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    body::after {
      content: '';
      position: absolute;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(74,133,245,.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: white;
      border-radius: 20px;
      padding: 48px 44px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 40px 80px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.06);
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .logo-area img {
      height: 44px;
      width: auto;
      margin-bottom: 14px;
    }

    .logo-area .brand-name {
      font-size: 15px;
      font-weight: 700;
      color: #1A2456;
      text-align: center;
      letter-spacing: -.2px;
      line-height: 1.3;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #EEF3FF;
      color: #2D6ADF;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      margin-top: 10px;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #0F172A;
      letter-spacing: -.6px;
      margin-bottom: 6px;
      text-align: center;
    }

    .sub {
      font-size: 14px;
      color: #6B7280;
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      letter-spacing: .3px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #E5E9F2;
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      color: #0F172A;
      background: #F9FAFB;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    input:focus {
      border-color: #2D6ADF;
      background: white;
      box-shadow: 0 0 0 3px rgba(45,106,223,.1);
    }

    .error-box {
      display: none;
      align-items: center;
      gap: 8px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #DC2626;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .error-box.visible { display: flex; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #1A2456;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      margin-top: 8px;
      letter-spacing: -.1px;
    }
    .btn-login:hover {
      background: #2D6ADF;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(45,106,223,.3);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #94A3B8;
      text-decoration: none;
      transition: color .2s;
    }
    .back-link:hover { color: #1A2456; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <img src="/brand_assets/security management system sign blue.png" alt="SMS Logo" />
      <div class="brand-name">Security Management<br>System</div>
      <div class="badge">Dokumentations-CMS</div>
    </div>

    <h1>Logga in</h1>
    <p class="sub">Åtkomst till dokumentationsadminpanelen</p>

    <div class="error-box" id="errorBox">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#DC2626"/><path d="M7 4v3M7 9.5v.5" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span id="errorText">Ogiltigt användarnamn eller lösenord</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Användarnamn</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus />
      </div>
      <div class="form-group">
        <label for="password">Lösenord</label>
        <input type="password" id="password" name="password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Logga in</button>
    </form>

    <a href="/index.html" class="back-link">← Tillbaka till produktsidan</a>
  </div>

  <script>
    fetch('/api/me').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/admin/dashboard.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorBox = document.getElementById('errorBox');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      errorBox.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Loggar in…';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (res.ok) {
          btn.textContent = '✓ Klart';
          window.location.href = '/admin/dashboard.html';
        } else {
          const data = await res.json();
          document.getElementById('errorText').textContent = data.error || 'Ogiltiga inloggningsuppgifter';
          errorBox.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Logga in';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        document.getElementById('errorText').textContent = 'Kunde inte ansluta till servern. Körs den?';
        errorBox.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Logga in';
      }
    });
  </script>
</body>
</html>
